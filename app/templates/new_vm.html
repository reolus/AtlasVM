{% extends "base.html" %}
{% block content %}
<section class="form-card">
  <h2>Create Virtual Machine</h2>
  <form method="post" action="/vms/new">
    <label>Name <input name="name" required placeholder="debian-test-01"></label>
    <label>Memory MB <input name="memory_mb" type="number" value="2048" min="256" required></label>
    <label>vCPUs <input name="vcpus" type="number" value="2" min="1" required></label>
    <label>Disk GB <input name="disk_gb" type="number" value="20" min="1" required></label>
    <label>Storage Pool
      <select name="storage_pool">
      {% for pool in pools %}<option value="{{ pool.name }}" {% if pool.name == default_pool %}selected{% endif %}>{{ pool.name }}</option>{% endfor %}
      </select>
    </label>
    <label>Network
      <select name="network">
      {% for net in networks %}<option value="{{ net.name }}" {% if net.name == default_network %}selected{% endif %}>{{ net.name }}</option>{% endfor %}
      </select>
    </label>
    <label>ISO Path <input name="iso_path" placeholder="/var/lib/libvirt/images/debian.iso"></label>
    <button class="button" type="submit">Create VM</button>
  </form>
</section>
{% endblock %}
