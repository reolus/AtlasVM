{% extends "base.html" %}
{% block content %}
<section class="atlas-hero storage-page-hero"><div><div class="atlas-kicker"><i class="fa-solid fa-server"></i> NFS Storage</div><h2>New NFS Target</h2><p class="muted mb-0">Add an NFS export for backups, ISO storage, templates, or VM disks.</p></div><div class="hero-actions"><a class="btn btn-outline-light" href="/storage"><i class="fa-solid fa-arrow-left"></i>Storage</a></div></section>
{% if error %}<div class="alert danger"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>{% endif %}{% if message %}<div class="alert success"><i class="fa-solid fa-circle-check"></i> {{ message }}</div>{% endif %}
<section class="panel atlas-panel storage-form-panel"><form class="stacked-form" method="post" action="/storage/nfs/new"><div class="grid two"><label>Name<input name="name" placeholder="nfs-backups" required></label><label>NFS Version<select name="nfs_version"><option value="4">4</option><option value="4.1">4.1</option><option value="4.2">4.2</option><option value="3">3</option></select></label></div><label>Storage Network Profile<select name="storage_network"><option value="">Use normal host routing</option>{% for name, n in storage_networks.items() %}<option value="{{ name }}">{{ name }} - {{ n.get('interface_name', '') }} {{ n.get('ip_cidr', '') }}</option>{% endfor %}</select><small>This documents the intended storage traffic path. Mounting still depends on host routing and interface reachability.</small></label><div class="grid two"><label>NFS Server<input name="server" placeholder="10.60.0.20 or storage.example.local" required></label><label>Export Path<input name="export_path" placeholder="/exports/atlasvm" required></label></div><label>Local Mount Path<input name="mount_path" placeholder="/atlasvm-storage/nfs/backups" required></label><label>Mount Options<input name="mount_options" value="rw,_netdev,noatime"></label><fieldset class="atlas-fieldset"><legend>Storage Roles</legend><div class="vm-option-row"><label class="check"><input type="checkbox" name="roles" value="backups"> Backups</label><label class="check"><input type="checkbox" name="roles" value="iso"> ISO Library</label><label class="check"><input type="checkbox" name="roles" value="templates"> Templates</label><label class="check"><input type="checkbox" name="roles" value="vm-disks"> VM Disks</label></div></fieldset><label class="check"><input type="checkbox" name="create_libvirt_pool" value="yes"> Create libvirt storage pool</label><label>Libvirt Pool Name<input name="libvirt_pool_name" placeholder="atlasvm-nfs-backups"></label><div class="action-cluster"><button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i>Save NFS Target</button><a class="btn btn-outline-light" href="/storage">Cancel</a></div></form></section>
{% endblock %}
