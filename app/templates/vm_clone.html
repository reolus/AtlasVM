{% extends "base.html" %}
{% block content %}
<section class="atlas-hero vm-page-hero">
  <div>
    <div class="atlas-kicker"><i class="fa-solid fa-copy"></i> Clone VM</div>
    <h2>Clone {{ name }}</h2>
    <p class="muted mb-0">Cloning should be performed while the source VM is powered off. The clone receives a new VM definition and copied disks.</p>
  </div>
  <a class="btn btn-outline-light" href="/vms/{{ name }}"><i class="fa-solid fa-arrow-right"></i>Back to VM</a>
</section>

<section class="panel atlas-panel vm-form-panel vm-centered-panel">
  <div class="section-title"><h2><i class="fa-solid fa-copy"></i> Clone Settings</h2></div>
  <form method="post" action="/vms/{{ name }}/clone" class="stacked-form atlas-vm-form">
    <label>New VM name <input class="form-control" name="new_name" required autocomplete="off" placeholder="{{ name }}-clone"></label>
    <div class="action-row">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-copy"></i>Clone VM</button>
      <a href="/vms/{{ name }}" class="btn btn-outline-light"><i class="fa-solid fa-xmark"></i>Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
