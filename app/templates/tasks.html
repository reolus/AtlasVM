{% extends "base.html" %}
{% block content %}
<section>
  <h2>Tasks</h2>
  <table><thead><tr><th>Started</th><th>Finished</th><th>Actor</th><th>Action</th><th>Target</th><th>Status</th><th>Message</th></tr></thead><tbody>
    {% for task in tasks %}<tr><td>{{ task.created_at }}</td><td>{{ task.finished_at }}</td><td>{{ task.actor }}</td><td>{{ task.action }}</td><td>{{ task.target }}</td><td><span class="pill {{ task.status }}">{{ task.status }}</span></td><td>{{ task.message }}</td></tr>{% endfor %}
  </tbody></table>
</section>
{% endblock %}
