<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - {{ app_name }}</title>
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <main class="login-shell atlas-login-shell">
    <section class="login-card atlas-login-card">
      <div class="login-logo-wrap"><img src="/static/atlasvm-logo.png" alt="AtlasVM Community Edition logo" class="login-logo"></div>
      <div class="login-copy"><h1>Sign in</h1><p>Single-node virtualization management</p><p class="login-subcopy">Rock Bluffs Labs, LLC</p></div>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
      <form method="post" action="/login" class="login-form">
        <input type="hidden" name="next_url" value="{{ next_url }}">
        <label>Username<input class="form-control" name="username" required autocomplete="username" autofocus></label>
        <label>Password<input class="form-control" name="password" type="password" required autocomplete="current-password"></label>
        <button type="submit" class="btn btn-primary login-button"><i class="fa-solid fa-key"></i>Sign in</button>
      </form>
    </section>
  </main>
</body>
</html>
