{% extends "base.html" %}
{% block content %}
<section class="atlas-hero vm-page-hero danger-zone">
  <div>
    <div class="atlas-kicker"><i class="fa-solid fa-triangle-exclamation"></i> Destructive Action</div>
    <h2>Delete {{ name }}?</h2>
    <p class="muted mb-0">This deletes the VM definition. If disk deletion is selected, active VM disk files may also be removed. Backups and ZFS snapshots are not deleted here.</p>
  </div>
  <a class="btn btn-outline-light" href="/vms/{{ name }}"><i class="fa-solid fa-arrow-right"></i>Back to VM</a>
</section>

<section class="panel atlas-panel danger-zone vm-form-panel vm-centered-panel">
  <div class="section-title"><h2><i class="fa-solid fa-trash"></i> Confirmation Required</h2></div>
  <form method="post" action="/vms/{{ name }}/delete" class="stacked-form atlas-vm-form">
    <label>Type the VM name to confirm <input class="form-control" name="confirm_name" required autocomplete="off" placeholder="{{ name }}"></label>
    <label class="check"><input class="form-check-input" type="checkbox" name="delete_disks" id="delete_disks"> Also delete VM disks</label>
    <div class="action-row">
      <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash"></i>Delete VM</button>
      <a href="/vms/{{ name }}" class="btn btn-outline-light"><i class="fa-solid fa-xmark"></i>Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
