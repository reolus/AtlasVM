{% extends "base.html" %}
{% block content %}
<section>
  <div class="section-title"><h2>ISO Library</h2><span><code>{{ iso_path }}</code></span></div>
  <form method="post" action="/isos/upload" enctype="multipart/form-data" class="inline-form">
    <input type="file" name="file" accept=".iso,.img" required>
    <button>Upload ISO</button>
  </form>
  <table><thead><tr><th>Name</th><th>Size</th><th>Path</th><th>Actions</th></tr></thead><tbody>
    {% for iso in isos %}
      <tr><td>{{ iso.name }}</td><td>{{ iso.size_mb }} MB</td><td><code>{{ iso.path }}</code></td><td><form method="post" action="/isos/{{ iso.name }}/delete"><button class="danger">Delete</button></form></td></tr>
    {% else %}<tr><td colspan="4">No ISOs found. Download one, because VMs rarely install themselves out of sheer optimism.</td></tr>{% endfor %}
  </tbody></table>
</section>
{% endblock %}
