<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - {{ app_name }}</title>
  <link rel="icon" href="/static/atlasvm-logo.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-logo-wrap">
        <img src="/static/atlasvm-logo.png" alt="AtlasVM logo" class="login-logo">
      </div>
      <div class="login-copy">
        <h1>Sign in</h1>
        <p>Manage KVM, libvirt, ZFS, backups, templates, and networks from one AtlasVM console.</p>
      </div>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      {% if message %}<div class="notice success">{{ message }}</div>{% endif %}
      <form method="post" action="/login" class="login-form">
        <input type="hidden" name="next_url" value="{{ next_url }}">
        <label>Username
          <input name="username" required autocomplete="username" autofocus>
        </label>
        <label>Password
          <input name="password" type="password" required autocomplete="current-password">
        </label>
        <button type="submit" class="login-button">Sign in</button>
      </form>
    </section>
  </main>
</body>
</html>
